<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RPG World</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/babel-standalone/babel.min.js"></script>
  <style>
    body { margin:0; font-family: 'Segoe UI', sans-serif; background: #0d1b2a; color: #fff; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // ─── Utilities ─────────────────────────────────────────────────────────────
    const uid = () => Math.random().toString(36).slice(2, 9);
    const now = () => new Date().toISOString();

    const timeAgo = (iso) => {
      const diff = Date.now() - new Date(iso).getTime();
      const m = Math.floor(diff / 60000);
      if (m < 1) return "agora";
      if (m < 60) return `há ${m} min`;
      const h = Math.floor(m / 60);
      if (h < 24) return `há ${h}h`;
      const d = Math.floor(h / 24);
      if (d < 30) return `há ${d} dias`;
      return "há 6 meses";
    };

    // ─── ImagePicker ───────────────────────────────────────────────────────────
    function ImagePicker({ value, onChange, label, height = 110, round = false, placeholder = "📷 Adicionar imagem" }) {
      const [mode, setMode] = React.useState(null);
      const [urlInput, setUrlInput] = React.useState("");
      const fileRef = React.useRef();

      const handleFile = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => { onChange(ev.target.result); setMode(null); };
        reader.readAsDataURL(file);
        e.target.value = "";
      };

      const confirmUrl = () => {
        const trimmed = urlInput.trim();
        if (trimmed) onChange(trimmed);
        setMode(null);
        setUrlInput("");
      };

      return React.createElement('div', { style: { marginBottom: 8 }},
        label && React.createElement('p', { style: { margin: "0 0 6px", fontSize: 13, fontWeight: 600, color: "#9b72cf" } }, label),
                                     // ─── Mock Images ───────────────────────────────────────────────────────────
    const IMG = {
      castle: "https://images.unsplash.com/photo-1520637836862-4d197d17c27a?w=600&q=80",
      castle2: "https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=600&q=80",
      village: "https://images.unsplash.com/photo-1598300042247-d088f8ab3a91?w=600&q=80",
      forest: "https://images.unsplash.com/photo-1448375240586-882707db888b?w=600&q=80",
      sword: "https://images.unsplash.com/photo-1589656966895-2f33e7653819?w=600&q=80",
      girl: "https://images.unsplash.com/photo-1508214751196-bcfd4ca60f91?w=600&q=80",
      girlAutumn: "https://images.unsplash.com/photo-1516912481808-3406841bd33c?w=600&q=80",
      strawberry: "https://images.unsplash.com/photo-1464965911861-746a04b4bca6?w=600&q=80",
      mango: "https://images.unsplash.com/photo-1553279768-865429fa0078?w=600&q=80",
      profileCover: "https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?w=800&q=80",
      profile1: "https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=200&q=80",
      profile2: "https://images.unsplash.com/photo-1527980965255-d3b416303d12?w=200&q=80",
      profile3: "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=200&q=80",
      confeitaria: "https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=600&q=80",
    };

    // ─── Initial Data ──────────────────────────────────────────────────────────
    const INITIAL_USERS = [
      { id: "u1", username: "momoe", password: "123", displayName: 'Momoe" ✨ Porcelana', isAdmin: false },
    ];

    const INITIAL_COMMUNITIES = [
      {
        id: "c1", name: "Confeitaria Doce Amor", description: "Um mundo doce e mágico de RPG",
        coverImage: IMG.confeitaria, creatorId: "u1", memberCount: 1
      },
      {
        id: "c2", name: "Reino dos dragões", description: "O reino épico dos dragões",
        coverImage: IMG.castle, creatorId: "u1", memberCount: 1
      },
    ];
    // ─── Main App Component ───────────────────────────────────────────────────
    function App() {
      const [users] = React.useState(INITIAL_USERS);
      const [currentUser, setCurrentUser] = React.useState(null);
      const [screen, setScreen] = React.useState("login");
      const [activeCommunity, setActiveCommunity] = React.useState(null);
      const [innerTab, setInnerTab] = React.useState("home");
      const [activeChat, setActiveChat] = React.useState(null);

      const handleLogin = (user) => {
        setCurrentUser(user);
        setScreen("explore");
      };

      if (screen === "login") {
        return React.createElement(LoginScreen, { users, onLogin: handleLogin });
      }

      if (screen === "explore") {
        return React.createElement(ExploreScreen, {
          currentUser,
          communities: INITIAL_COMMUNITIES,
          onEnter: (c) => { setActiveCommunity(c); setScreen("community"); }
        });
      }

      if (screen === "community") {
        return React.createElement(CommunityScreen, {
          currentUser,
          community: activeCommunity,
          innerTab,
          setInnerTab,
          activeChat,
          setActiveChat
        });
      }

      return React.createElement('div', null, 'Carregando...');
    }

    // ─── Login Screen ─────────────────────────────────────────────────────────
    function LoginScreen({ users, onLogin }) {
      const [username, setUsername] = React.useState("");
      const [password, setPassword] = React.useState("");

      const handleSubmit = () => {
        const user = users.find(u => u.username === username && u.password === password);
        if (user) {
          onLogin(user);
        } else {
          alert("Usuário ou senha incorretos. Tente momoe / 123");
        }
      };

      return React.createElement('div', {
        style: {
          minHeight: '100vh',
          background: 'linear-gradient(135deg, #1a0533 0%, #0d1b2a 100%)',
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          color: '#fff'
        }
      },
        React.createElement('div', { style: { textAlign: 'center', maxWidth: '400px', padding: '20px' }},
          React.createElement('div', { style: { fontSize: '60px', marginBottom: '20px' }}, '⚔️'),
          React.createElement('h1', { style: { margin: '0 0 10px' }}, 'RPG World'),
          React.createElement('p', { style: { color: '#9b72cf', marginBottom: '30px' }}, 'Entre no mundo de aventuras'),

          React.createElement('input', {
            placeholder: 'Usuário',
            value: username,
            onChange: (e) => setUsername(e.target.value),
            style: { display: 'block', width: '100%', padding: '14px', margin: '10px 0', borderRadius: '12px', border: 'none' }
          }),
          React.createElement('input', {
            type: 'password',
            placeholder: 'Senha',
            value: password,
            onChange: (e) => setPassword(e.target.value),
            style: { display: 'block', width: '100%', padding: '14px', margin: '10px 0', borderRadius: '12px', border: 'none' }
          }),

          React.createElement('button', {
            onClick: handleSubmit,
            style: {
              width: '100%',
              padding: '16px',
              background: 'linear-gradient(#7c3aed, #9333ea)',
              color: 'white',
              border: 'none',
              borderRadius: '12px',
              fontSize: '17px',
              marginTop: '15px',
              cursor: 'pointer'
            }
          }, 'ENTRAR')
        )
      );
    }
          // ─── Explore Screen ───────────────────────────────────────────────────────
    function ExploreScreen({ currentUser, communities, onEnter }) {
      return React.createElement('div', { style: { padding: '20px', minHeight: '100vh', background: '#1a0e2e' }},
        React.createElement('h1', { style: { color: '#fff', textAlign: 'center' }}, 'Explorar Comunidades'),
        
        communities.map(community => 
          React.createElement('div', {
            key: community.id,
            style: {
              background: '#2a1f3d',
              margin: '15px 0',
              borderRadius: '16px',
              overflow: 'hidden'
            }
          },
            React.createElement('div', {
              style: {
                height: '160px',
                backgroundImage: `url(${community.coverImage})`,
                backgroundSize: 'cover',
                backgroundPosition: 'center'
              }
            }),
            React.createElement('div', { style: { padding: '16px' }},
              React.createElement('h3', { style: { margin: '0 0 8px', color: '#fff' }}, community.name),
              React.createElement('p', { style: { color: '#ccc', margin: '0 0 12px' }}, community.description),
              React.createElement('button', {
                onClick: () => onEnter(community),
                style: {
                  width: '100%',
                  padding: '14px',
                  background: '#16a34a',
                  color: 'white',
                  border: 'none',
                  borderRadius: '12px',
                  fontWeight: '700'
                }
              }, 'Entrar na Comunidade')
            )
          )
        )
      );
    }

    // ─── Community Screen ─────────────────────────────────────────────────────
    function CommunityScreen({ currentUser, community, innerTab, setInnerTab, activeChat, setActiveChat }) {
      const [messages, setMessages] = React.useState([]);

      const sendMessage = (text) => {
        if (!text.trim()) return;
        setMessages(prev => [...prev, {
          id: uid(),
          userId: currentUser.id,
          text: text,
          createdAt: now()
        }]);
      };

      return React.createElement('div', { style: { minHeight: '100vh', background: '#0d1b2a' }},
        React.createElement('div', {
          style: {
            padding: '16px',
            background: '#1a2533',
            display: 'flex',
            alignItems: 'center',
            gap: '12px'
          }
        },
          React.createElement('button', { onClick: () => setInnerTab("home"), style: { fontSize: '24px' }}, '←'),
          React.createElement('h2', { style: { margin: 0 }}, community.name)
        ),

        innerTab === "home" && React.createElement('div', { style: { padding: '20px' }},
          React.createElement('button', {
            onClick: () => setInnerTab("chat"),
            style: { width: '100%', padding: '16px', background: '#7c3aed', border: 'none', borderRadius: '12px', color: 'white', marginBottom: '12px' }
          }, '💬 Abrir Chat'),
          React.createElement('button', {
            onClick: () => setInnerTab("posts"),
            style: { width: '100%', padding: '16px', background: '#7c3aed', border: 'none', borderRadius: '12px', color: 'white' }
          }, '✨ Ver Posts')
        ),

        innerTab === "chat" && React.createElement('div', { style: { height: 'calc(100vh - 60px)', display: 'flex', flexDirection: 'column' }},
          React.createElement('div', { style: { flex: 1, padding: '16px', overflowY: 'auto' }},
            messages.map(msg => 
              React.createElement('div', {
                key: msg.id,
                style: { marginBottom: '12px', textAlign: msg.userId === currentUser.id ? 'right' : 'left' }
              },
                React.createElement('div', {
                  style: {
                    display: 'inline-block',
                    background: msg.userId === currentUser.id ? '#7c3aed' : '#1f2a3a',
                    padding: '10px 14px',
                    borderRadius: '18px',
                    maxWidth: '80%'
                  }
                }, msg.text)
              )
            )
          ),
          React.createElement('div', { style: { padding: '12px', background: '#1a2533', display: 'flex' }},
            React.createElement('input', {
              placeholder: 'Digite sua mensagem...',
              onKeyDown: (e) => { if (e.key === 'Enter') { sendMessage(e.target.value); e.target.value = ''; } },
              style: { flex: 1, padding: '14px', borderRadius: '999px', border: 'none', marginRight: '8px' }
            }),
            React.createElement('button', {
              onClick: () => { /* send */ },
              style: { padding: '0 24px', background: '#7c3aed', border: 'none', borderRadius: '999px', color: 'white' }
            }, '➤')
          )
        )
      );
    }
          // ─── Render App ───────────────────────────────────────────────────────────
    ReactDOM.render(
      React.createElement(App),
      document.getElementById('root')
    );
  </script>
</body>
</html>
